[project]
name = "titan-cli"
type = "generic"

[plugins.git]
enabled = true

[plugins.git.config]
main_branch = "master"
default_remote = "origin"

[plugins.github]
enabled = true

[plugins.github.config]
repo_owner = "masorange"
repo_name = "titan-cli"
default_branch = "master"
pr_template_path = ".github/pull_request_template.md"
auto_assign_prs = true

[plugins.jira]
enabled = false

[plugins.ragnarok]
enabled = true

[plugins.ragnarok.source]
channel = "stable"
repo_url = "https://github.com/masmovil/ragnarok-titan-cli-workflows"
requested_ref = "0.4.0"
resolved_commit = "67d405560f89b55b56be377f537da76fb3307c15"

[plugins.ragnarok.config]
platform = "android"
