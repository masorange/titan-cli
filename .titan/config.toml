[project]
name = "titan-cli"
type = "generic"

[plugins.git]
enabled = true

[plugins.git.config]
main_branch = "master"
default_remote = "origin"

[plugins.github]
enabled = true

[plugins.github.config]
repo_owner = "masorange"
repo_name = "titan-cli"
default_branch = "master"
pr_template_path = ".github/pull_request_template.md"
auto_assign_prs = true

[plugins.jira]
enabled = false

[plugins.ragnarok]
enabled = true

[plugins.ragnarok.source]
channel = "stable"
repo_url = "https://github.com/masmovil/ragnarok-titan-cli-workflows"
requested_ref = "0.5.0"
resolved_commit = "8d1cd285f71231630d131387262c4a25ec554959"

[plugins.ragnarok.config]
platform = "android"
