name: "Docker Down"
description: "Stop Docker Compose services - pick which ones stay running via a checklist (all checked stops everything)"

steps:
  - id: select_services_to_stop
    name: "Select Services to Stop"
    plugin: docker
    step: select_services_to_stop

  - id: compose_down
    name: "Stop Docker Services"
    plugin: docker
    step: compose_down

  - id: compose_status
    name: "Docker Compose Status"
    plugin: docker
    step: compose_status
