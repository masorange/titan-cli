name: "Review PR (Iterative AI)"
description: "Review a pull request with iterative AI refinement loop"

steps:
  - id: select_pr
    name: "Select PR to Review"
    plugin: github
    step: select_pr_for_code_review

  - id: select_cli
    name: "Select AI CLI"
    plugin: github
    step: select_cli

  - id: fetch_changes
    name: "Fetch PR Changes"
    plugin: github
    step: fetch_pr_changes

  - id: initial_review
    name: "Initial AI Analysis"
    plugin: github
    step: ai_cli_initial_review
    params:
      pr_key: review_pr
      diff_key: review_diff
      threads_key: review_threads
      output_key: review
      cli_preference: ${cli_preference}
      timeout: 300
    on_error: continue

  - id: validate_comments
    name: "Validate & Refine Comments"
    plugin: github
    step: validate_review_comments
    params:
      cli_preference: ${cli_preference}
      timeout: 60
    on_error: continue

  - id: submit_review
    name: "Submit Review"
    plugin: github
    step: submit_pr_review
    on_error: continue
