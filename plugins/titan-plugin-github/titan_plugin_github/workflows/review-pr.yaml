name: "Review PR"
description: "Review a pull request using AI with project skills"

steps:
  - id: select_pr
    name: "Select PR to Review"
    plugin: github
    step: select_pr_for_code_review

  - id: fetch_changes
    name: "Fetch PR Review Bundle"
    plugin: github
    step: fetch_pr_review_bundle

  - id: ai_review
    name: "AI Code Review"
    plugin: github
    step: ai_review_pr

  - id: summarize
    name: "PR Review Summary"
    plugin: github
    step: summarize_pr_review

  - id: validate
    name: "Validate Review Comments"
    plugin: github
    step: validate_review_comments

  - id: submit
    name: "Submit Review"
    plugin: github
    step: submit_pr_review
