name: "Send Slack Channel Message"
description: "Select a channel, prepare the channel destination, compose a message, and send it"

steps:
  - id: validate_connection
    name: "Validate Slack Connection"
    plugin: slack
    step: validate_connection

  - id: select_channel_target
    name: "Select Slack Channel Target"
    plugin: slack
    step: select_channel_target

  - id: prepare_message_destination
    name: "Prepare Message Destination"
    plugin: slack
    step: prepare_message_destination

  - id: prompt_message_body
    name: "Compose Message"
    plugin: slack
    step: prompt_message_body

  - id: post_message
    name: "Send Message"
    plugin: slack
    step: post_message
