name: "Discover Slack Workspace"
description: "Validate the current Slack connection and inspect accessible users and public channels"

params:
  slack_limit: 20
  slack_exclude_archived: true

steps:
  - id: validate_connection
    name: "Validate Slack Connection"
    plugin: slack
    step: validate_connection

  - id: list_public_channels
    name: "List Public Channels"
    plugin: slack
    step: list_public_channels
    params:
      slack_limit: "${slack_limit}"
      slack_exclude_archived: "${slack_exclude_archived}"

  - id: list_users
    name: "List Users"
    plugin: slack
    step: list_users
    params:
      slack_limit: "${slack_limit}"
