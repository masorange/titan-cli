name: "Plan JIRA Issue with AI CLI"
description: "Fetch a JIRA issue and its comments, then hand it off to an AI coding CLI to study it, break the work into steps, and confirm the plan with you"

steps:
  - id: select_issue
    name: "Select JIRA Issue"
    plugin: jira
    step: select_jira_issue

  - id: get_issue
    name: "Get Full Issue Details"
    plugin: jira
    step: get_issue

  - id: get_comments
    name: "Get Issue Comments"
    plugin: jira
    step: get_comments

  - id: build_task_context
    name: "Build Task Context"
    plugin: jira
    step: build_jira_task_context

  - id: plan_with_cli
    name: "Study Issue and Confirm Plan"
    plugin: core
    step: ai_code_assistant
    params:
      context_key: "jira_task_context"
      cli_preference: "auto"
      # This workflow's whole purpose is handing the issue off to an AI CLI, so skip the
      # "do you want AI assistance?" prompt and go straight to CLI selection/launch.
      ask_confirmation: false
      fail_on_decline: false
